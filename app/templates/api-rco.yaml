apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.image.name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.image.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.image.name }}
    spec:
      imagePullSecrets:
      - name: {{ .Values.imagePullSecret }}
      containers:
      - name: {{ .Values.image.name }}
        image: {{ .Values.repository }}/{{ .Values.image.name }}:{{ .Values.image.tag }}
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.image.name }}-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Values.image.name }}
  ports:
  - port: 80
    targetPort: 80
 
---
{{- if .Values.http }}
#http redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.image.name }}-http-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: http-gw
    namespace: gateway
  hostnames:
  - {{ .Values.http.host }}
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
{{- if .Values.http.redirectToHttps }}
#httproute
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.image.name }}-httproute
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: https-gw
    namespace: gateway
  hostnames:
  - {{ .Values.http.host }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ .Values.image.name }}-svc
      port: 80
{{- end }}
{{- end }}