name: Deploy RCO Apps
run-name: Deploy ${{ inputs.image || github.event.inputs.image }}:${{ inputs.version || github.event.inputs.version }}
on:
  workflow_call:
    inputs:
      version:
        description: 'Version to commit'
        required: true
        type: string
      image:
        description: 'Image to commit'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to commit'
        required: true
        type: string
      image:
        description: 'Image to commit'
        required: true
        type: choice
        options:
          - api-rco
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy inputs
        run: |
          test -n "${{ inputs.image || github.event.inputs.image }}" || (echo "image is empty" && exit 1)
          test -n "${{ inputs.version || github.event.inputs.version }}" || (echo "version is empty" && exit 1)
  dev:
    runs-on: ubuntu-latest
    environment:
      name: dev
    env:
      IMAGE: ${{ inputs.image || github.event.inputs.image }}
      VERSION: ${{ inputs.version || github.event.inputs.version }}
    steps:
      - name: Deploy with Helm
        uses: rosecroixdor/core/deploy-to-k8s@main
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          namespace: dev
          image: ${{ env.IMAGE }}
          version: ${{ env.VERSION }}
          cors_yaml: ${{ vars.CORS }}
          ghcr_username: ${{ secrets.GHCR_USERNAME }}
          ghcr_password: ${{ secrets.GHCR_TOKEN }}
  qa:
    runs-on: ubuntu-latest
    environment:
      name: qa
    env:
      IMAGE: ${{ inputs.image || github.event.inputs.image }}
      VERSION: ${{ inputs.version || github.event.inputs.version }}
    steps:
      - name: Deploy with Helm
        uses: rosecroixdor/core/deploy-to-k8s@main
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          namespace: qa
          image: ${{ env.IMAGE }}
          version: ${{ env.VERSION }}
          cors_yaml: ${{ vars.CORS }}
          ghcr_username: ${{ secrets.GHCR_USERNAME }}
          ghcr_password: ${{ secrets.GHCR_TOKEN }}
  production:
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      IMAGE: ${{ inputs.image || github.event.inputs.image }}
      VERSION: ${{ inputs.version || github.event.inputs.version }}
    steps:
      - name: Deploy with Helm
        uses: rosecroixdor/core/deploy-to-k8s@main
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          namespace: production
          image: ${{ env.IMAGE }}
          version: ${{ env.VERSION }}
          cors_yaml: ${{ vars.CORS }}
          ghcr_username: ${{ secrets.GHCR_USERNAME }}
          ghcr_password: ${{ secrets.GHCR_TOKEN }}
