name: Deploy RCO Apps
run-name: Deploy ${{ inputs.image || github.event.inputs.image }}:${{ inputs.version || github.event.inputs.version }} to ${{ inputs.target_env || github.event.inputs.target_env }}
on:
  workflow_call:
    inputs:
      version:
        description: 'Version to commit'
        required: true
        type: string
      image:
        description: 'Image to commit'
        required: true
        type: string
      target_env:
        description: 'Environnement de destination'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to commit'
        required: true
        type: string
      image:
        description: 'Image to commit'
        required: true
        type: string
      target_env:
        description: 'Environnement de destination'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NAMESPACE: ${{ inputs.target_env || github.event.inputs.target_env }}
      IMAGE: ${{ inputs.image || github.event.inputs.image }}
      VERSION: ${{ inputs.version || github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate deploy inputs
        run: |
          test -n "${{ env.NAMESPACE }}" || (echo "target_env/namespace is empty" && exit 1)
          test -n "${{ env.IMAGE }}" || (echo "image is empty" && exit 1)
          test -n "${{ env.VERSION }}" || (echo "version is empty" && exit 1)
      - name: Create kubeconfig
        uses: rosecroixdor/core/set-kubeconfig@main
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
      - name: Ensure GHCR pull secret
        uses: rosecroixdor/core/ensure-ghcr-secret@main
        with:
          namespace: ${{ env.NAMESPACE }}
          secret_name: ghcr-secret
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Deploy with Helm
        run: |
          #github var CORS to file
          ${{env.CORS}} > ./cors.yaml
          kubectl label namespace "${{env.NAMESPACE}}" gateway-access=true --overwrite
          helm upgrade --install ${{env.IMAGE}} \
                oci://ghcr.io/${{ github.repository_owner }}/rco-apps \
                --namespace ${{env.NAMESPACE}} \
                -f ./cors.yaml \
                --set image.name=${{env.IMAGE}} \
                --set image.tag=${{env.VERSION}} \
                --set Cors.AllowedOrigins[0]=http://localhost:3000 \
