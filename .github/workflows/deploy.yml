on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NAMESPACE: dev
    steps:
      - uses: actions/checkout@v4
      - name: Create kubeconfig
        uses: rosecroixdor/core/set-kubeconfig@main
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
      - name: Ensure GHCR pull secret
        uses: rosecroixdor/core/ensure-ghcr-secret@main
        with:
          namespace: ${{ env.NAMESPACE }}
          secret_name: ghcr-secret
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Deploy with Helm
        run: |
          helm upgrade --install rco-apps ./rco-apps --namespace "$NAMESPACE" --create-namespace
          kubectl label namespace "$NAMESPACE" gateway-access=true --overwrite