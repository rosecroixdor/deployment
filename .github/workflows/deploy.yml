name: Deploy RCO Apps
run-name: Deploy ${{ github.event.inputs.image || github.event.registry_package.name }}:${{ github.event.inputs.version || github.event.registry_package.package_version.container_metadata.tag.name || github.event.registry_package.package_version.version }}
on:
  registry_package:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to commit'
        required: true
        type: string
      image:
        description: 'Image to commit'
        required: true
        type: choice
        options:
          - api-rco
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy inputs
        run: |
          test -n "${{ github.event.inputs.image || github.event.registry_package.name }}" || (echo "image is empty" && exit 1)
          test -n "${{ github.event.inputs.version || github.event.registry_package.package_version.container_metadata.tag.name || github.event.registry_package.package_version.version }}" || (echo "version is empty" && exit 1)
  dev:
    needs: verify
    runs-on: ubuntu-latest
    environment: dev
    env:
      IMAGE: ${{ github.event.inputs.image || github.event.registry_package.name }}
      VERSION: ${{ github.event.inputs.version || github.event.registry_package.package_version.container_metadata.tag.name || github.event.registry_package.package_version.version }}
    steps:
      - name: Deploy with Helm
        uses: rosecroixdor/core/deploy-to-k8s@main
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          namespace: dev
          image: ${{ env.IMAGE }}
          version: ${{ env.VERSION }}
          cors_yaml: ${{ vars.CORS }}
          ghcr_username: ${{ secrets.GHCR_USERNAME }}
          ghcr_password: ${{ secrets.GHCR_TOKEN }}
  qa:
    needs: verify
    runs-on: ubuntu-latest
    environment: qa
    env:
      IMAGE: ${{ github.event.inputs.image || github.event.registry_package.name }}
      VERSION: ${{ github.event.inputs.version || github.event.registry_package.package_version.container_metadata.tag.name || github.event.registry_package.package_version.version }}
    steps:
      - name: Deploy with Helm
        uses: rosecroixdor/core/deploy-to-k8s@main
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          namespace: qa
          image: ${{ env.IMAGE }}
          version: ${{ env.VERSION }}
          cors_yaml: ${{ vars.CORS }}
          ghcr_username: ${{ secrets.GHCR_USERNAME }}
          ghcr_password: ${{ secrets.GHCR_TOKEN }}
  production:
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE: ${{ github.event.inputs.image || github.event.registry_package.name }}
      VERSION: ${{ github.event.inputs.version || github.event.registry_package.package_version.container_metadata.tag.name || github.event.registry_package.package_version.version }}
    steps:
      - name: Deploy with Helm
        uses: rosecroixdor/core/deploy-to-k8s@main
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          namespace: production
          image: ${{ env.IMAGE }}
          version: ${{ env.VERSION }}
          cors_yaml: ${{ vars.CORS }}
          ghcr_username: ${{ secrets.GHCR_USERNAME }}
          ghcr_password: ${{ secrets.GHCR_TOKEN }}
